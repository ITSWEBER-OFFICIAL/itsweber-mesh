name: Publish Docker image

on:
  push:
    tags: ["v*.*.*", "v*.*.*-*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.5.1-rc.2). Image is tagged exactly with this value."
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: itsweber-official/itsweber-mesh

jobs:
  publish:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `flavor: latest=false` disables the metadata-action default that
          # auto-attaches :latest to every push. We add :latest back only for
          # stable semver tags below (no `-` in the ref).
          flavor: |
            latest=false
          # For semver tags (e.g. refs/tags/v1.5.1):
          #   - v1.5.1            (raw tag)
          #   - 1.5.1             (without v prefix)
          #   - 1.5               (major.minor)
          #   - latest            (only if NOT a pre-release)
          # Pre-release tags (v1.5.1-rc.1, v1.5.1-beta) get only the raw value
          # — they do not move :latest.
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref, '-') }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### Pushed image tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
